detector:
  model_path: checkpoints/sailcv-rtdetrl640.pt
  architecture: rt-detr

layout_tracker:
  alpha: 0.7
  beta: 0.3
  max_distance: 0.2
  confidence_thresh: 0.0

crop_module:
  n_components: 2
  use_grayscale: true
  mask_fusion_alpha: 0.7
  sam_fail_min_coverage: 0.01
  sam_fail_max_coverage: 0.90
  mask_fusion_eps: 1e-6
  use_motion_in_pca_mask: true
  use_motion_for_direction: false

arrow_sense:
  tau_seconds: 0.2
  eps: 1e-6
  fusion_threshold: 0.0
  purge_state_after_seconds: 0.5

background_detector:
  type: ocv
  backend: cuda
  learn_rate: 0.01

mask_detector:
  type: sam
  iterations: 50

visualization:
  arrow_scale: 50.0
  arrow_thickness: 3
  arrow_color: [0, 255, 255]  # Yellow in BGR

output:
  generate_fgmask_video: true
  generate_pca_visualization: true
  output_tracking_video: true  # Produce main video (bboxes + labels)
  render_masks: true            # Vector run: mask overlay
  render_arrows: true           # Vector run: PCA arrows
