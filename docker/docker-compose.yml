services:
  mvs-app:
    build:
      context: ..
      dockerfile: docker/jetson.Dockerfile
    ports:
      - "7860:7860"
    environment:
      - DEVICE=cuda
      - MODEL=${MODEL:-MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth}
    volumes:
      - ../models:/app/models:ro
      - ../tmp:/app/tmp:rw
      - ../data:/app/data:rw
      - ../output:/app/output:rw
      - ../src:/app/src:rw
    cap_add:
      - IPC_LOCK
      - SYS_RESOURCE
    runtime: nvidia
    user: "1000:1000"
