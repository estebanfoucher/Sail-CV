services:
  sailcv-3d-reconstruction:
    build:
      context: ..
      dockerfile: docker/jetson.Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      - DEVICE=cuda
      - CUDA_MEMORY_FRACTION=0.8
      - PORT=${PORT}
      - LOGURU_LEVEL=${LOGURU_LEVEL}
    volumes:
      - ../data:/app/data:rw
      - ../assets:/app/assets:rw
      - ../output:/app/output:rw
      - ../checkpoints:/app/checkpoints:ro
      - ../src:/app/src:rw
      - ../web_app:/app/web_app:rw
    cap_add:
      - IPC_LOCK
      - SYS_RESOURCE
    runtime: nvidia
    user: "1000:1000"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
              options:
                memory: 2048
